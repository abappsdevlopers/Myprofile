<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — GoldProd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0a0a;
      --bg-surface: #121212;
      --text: #ffffff;
      --muted: #a8a8a8;
      --gold: #ffbd03;
      --gold-dim: rgba(255, 189, 3, 0.15);
      --gold-glow: rgba(255, 189, 3, 0.35);
      --radius: 16px;
      --transition: 0.3s ease-in-out;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    /* Background Wave Animation */
    .bg-wave {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(255,189,3,0.06), transparent 60%),
                  radial-gradient(900px 500px at 80% 90%, rgba(255,189,3,0.05), transparent 60%),
                  linear-gradient(180deg, var(--bg-deep), var(--bg-surface));
    }
    .bg-wave::after {
      content: "";
      position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, rgba(255,189,3,0.03) 0px, rgba(255,189,3,0.03) 1px, transparent 1px, transparent 80px);
      animation: goldWave 10s linear infinite;
    }
    @keyframes goldWave {
      0% { transform: translateX(0); opacity: 0.6; }
      50% { opacity: 1; }
      100% { transform: translateX(-80px); opacity: 0.6; }
    }

    /* Glassmorphism Header */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      background: rgba(18, 18, 18, 0.65);
      border-bottom: 1px solid rgba(255, 189, 3, 0.15);
    }
    .nav-container {
      max-width: 1280px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 72px;
    }
    .logo {
      font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.4rem;
      color: var(--gold); letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,189,3,0.35);
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a {
      font-size: 0.95rem; font-weight: 500; color: var(--muted);
      transition: var(--transition); position: relative;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a.active::after {
      content: ""; position: absolute; bottom: -6px; left: 0; right: 0; height: 2px;
      background: var(--gold); box-shadow: 0 0 8px var(--gold);
      border-radius: 2px;
    }
    .auth-btn {
      padding: 10px 22px; border-radius: 999px; border: 1px solid var(--gold-dim);
      background: rgba(255,189,3,0.08); color: var(--gold); font-weight: 600; font-size: 0.9rem;
      cursor: pointer; transition: var(--transition); font-family: 'Inter', sans-serif;
      box-shadow: 0 0 0 rgba(255,189,3,0);
    }
    .auth-btn:hover {
      border-color: var(--gold); background: rgba(255,189,3,0.18);
      box-shadow: 0 0 20px rgba(255,189,3,0.25);
    }

    /* Page Hero */
    .page-hero {
      position: relative; z-index: 2;
      padding: 140px 24px 40px; text-align: center;
      max-width: 900px; margin: 0 auto;
    }
    .page-hero h1 {
      font-family: 'Orbitron', sans-serif; font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 700; color: var(--text); letter-spacing: 1px;
    }
    .page-hero h1 span { color: var(--gold); text-shadow: 0 0 18px rgba(255,189,3,0.45); }
    .page-hero p {
      margin-top: 16px; color: var(--muted); font-size: 1.05rem; line-height: 1.7;
    }
    .gold-line {
      width: 80px; height: 3px; background: var(--gold); border-radius: 4px;
      margin: 24px auto 0; box-shadow: 0 0 12px rgba(255,189,3,0.5);
    }

    /* Contact Section */
    .contact-section {
      position: relative; z-index: 2;
      max-width: 680px; margin: 0 auto; padding: 40px 24px 100px;
    }
    .contact-card {
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255, 189, 3, 0.15);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .contact-card h2 {
      font-family: 'Orbitron', sans-serif; font-size: 1.3rem; color: var(--gold);
      text-shadow: 0 0 10px rgba(255,189,3,0.25);
      margin-bottom: 6px; text-align: center;
    }
    .contact-card .sub {
      text-align: center; color: var(--muted); font-size: 0.95rem; margin-bottom: 32px;
    }
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    .form-group {
      display: flex; flex-direction: column; gap: 8px;
    }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem;
      outline: none; transition: var(--transition);
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--gold); background: rgba(255,189,3,0.04);
      box-shadow: 0 0 18px rgba(255,189,3,0.12);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: rgba(255,255,255,0.25); }
    .form-group select {
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23a8a8a8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 14px center;
    }
    .form-group select option { background: #1a1a1a; color: var(--text); }
    .form-group textarea { min-height: 140px; resize: vertical; }

    .submit-btn {
      width: 100%; margin-top: 8px; padding: 16px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, rgba(255,189,3,0.18), rgba(255,189,3,0.08));
      color: var(--gold); font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1rem;
      letter-spacing: 1px; cursor: pointer; transition: var(--transition);
      border: 1px solid rgba(255,189,3,0.25);
      box-shadow: 0 0 0 rgba(255,189,3,0);
    }
    .submit-btn:hover {
      border-color: var(--gold); box-shadow: 0 0 28px rgba(255,189,3,0.25);
      transform: translateY(-2px);
    }
    .submit-btn:active { transform: translateY(0); }

    /* Alert / Toast */
    .toast {
      position: fixed; top: 92px; left: 50%; transform: translateX(-50%) translateY(-12px);
      z-index: 2000; padding: 14px 24px; border-radius: 12px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      background: rgba(18,18,18,0.9); border: 1px solid var(--gold-dim);
      color: var(--text); font-size: 0.95rem; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity 0.35s ease, transform 0.35s ease;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .toast.success { border-color: rgba(255,189,3,0.35); color: var(--gold); }
    .toast.error { border-color: rgba(255,80,80,0.35); color: #ff5050; }

    /* Responsive */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .page-hero { padding-top: 120px; }
      .contact-card { padding: 28px; }
      .form-grid { grid-template-columns: 1fr; }
    }
    .mobile-menu-btn {
      display: none; background: none; border: none; cursor: pointer; padding: 6px;
    }
    .mobile-menu-btn span {
      display: block; width: 24px; height: 2px; background: var(--gold); margin: 6px 0; border-radius: 2px;
    }
    @media (max-width: 640px) {
      .mobile-menu-btn { display: block; }
    }
  </style>
</head>
<body>
  <div class="bg-wave"></div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Glassmorphic Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">GoldProd</a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="store.html">Store</a>
        <a href="licensing.html">Licensing</a>
        <a href="discography.html">Discography</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="auth-btn" id="authBtn" onclick="handleAuth()">Log In</button>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Page Hero -->
  <section class="page-hero">
    <h1>Custom <span>Beat Inquiry</span></h1>
    <p>Tell us about your project. We build sounds that match your vision and move your audience.</p>
    <div class="gold-line"></div>
  </section>

  <!-- Contact Form -->
  <section class="contact-section">
    <div class="contact-card">
      <h2>Custom Beat Inquiry</h2>
      <p class="sub">Fill in the details and we’ll get back to you within 24 hours.</p>
      <form id="inquiryForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="genre">Genre</label>
            <select id="genre" name="genre" required>
              <option value="" disabled selected>Select genre</option>
              <option value="Trap">Trap</option>
              <option value="Drill">Drill</option>
              <option value="Boom Bap">Boom Bap</option>
              <option value="R&B / Trap Soul">R&B / Trap Soul</option>
              <option value="Alternative">Alternative</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="budget">Budget</label>
            <select id="budget" name="budget" required>
              <option value="" disabled selected>Select budget</option>
              <option value="$250 - $500">$250 - $500</option>
              <option value="$500 - $1,000">$500 - $1,000</option>
              <option value="$1,000 - $2,500">$1,000 - $2,500</option>
              <option value="$2,500+">$2,500+</option>
            </select>
          </div>
          <div class="form-group full">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Describe your project, timeline, and any references..." required></textarea>
          </div>
        </div>
        <button type="submit" class="submit-btn">Send Inquiry</button>
      </form>
    </div>
  </section>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
    }
  }
</script>

  <script>
    function handleAuth() {
      window.location.href = 'auth.html';
    }
    (function() {
      const btn = document.getElementById('authBtn');
      const user = localStorage.getItem('goldprod_user');
      if (user) { btn.textContent = 'Logout'; btn.onclick = function() { localStorage.removeItem('goldprod_user'); window.location.reload(); }; }
    })();

    const toast = document.getElementById('toast');
    function showToast(message, type) {
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'success');
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    document.getElementById('inquiryForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const genre = document.getElementById('genre').value;
      const budget = document.getElementById('budget').value;
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !genre || !budget || !message) {
        showToast('Please fill in all fields.', 'error');
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showToast('Please enter a valid email address.', 'error');
        return;
      }

      const inquiries = JSON.parse(localStorage.getItem('goldprod_inquiries') || '[]');
      inquiries.push({ name, email, genre, budget, message, date: new Date().toISOString() });
      localStorage.setItem('goldprod_inquiries', JSON.stringify(inquiries));

      showToast('Inquiry sent successfully! We will contact you soon.', 'success');
      e.target.reset();
    });
  </script>
</body>
</html>
