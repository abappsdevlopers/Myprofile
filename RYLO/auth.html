<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authentication — GoldProd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-wave"></div>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">GoldProd</a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="store.html">Store</a>
        <a href="licensing.html">Licensing</a>
        <a href="discography.html">Discography</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="auth-btn" id="authBtn">Log In</button>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div id="toast" class="toast"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="active" id="tabLogin" type="button">Log In</button>
        <button id="tabSignup" type="button">Sign Up</button>
      </div>

      <form id="loginForm" class="auth-form active" novalidate>
        <input type="email" id="loginEmail" placeholder="Email address" required autocomplete="email" />
        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password" />
        <button type="submit">Log In</button>
      </form>

      <form id="signupForm" class="auth-form" novalidate>
        <input type="email" id="signupEmail" placeholder="Email address" required autocomplete="email" />
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required autocomplete="new-password" />
        <button type="submit">Create Account</button>
      </form>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
    }
  }
</script>

  <script type="module">
    import { initAuthUI, initAuthForms } from './app.js';
    initAuthUI();
    initAuthForms();
  </script>
</body>
</html>
